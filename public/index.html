<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Socket Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
            max-height: 700px;
        }

        .chat-header {
            padding: 14px 18px;
            background: #2563eb;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }

        .messages,
        .welcome {
            flex: 1;
            list-style: none;
            padding: 16px;
            overflow-y: auto;
            background: #f9fafb;
        }

        .messages li {
            margin-bottom: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #e5e7eb;
            max-width: 80%;
            word-wrap: break-word;
        }

        .messages li.you {
            margin-left: auto;
            background: #bfdbfe;
        }

        .chat-form {
            display: flex;
            gap: 10px;
            padding: 12px;
            border-top: 1px solid #e5e7eb;
            background: #fff;
        }

        .chat-form input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            outline: none;
        }

        .chat-form button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }

        .chat-form button:hover {
            background: #1d4ed8;
        }

        .messages li small {
            display: block;
            margin-top: 6px;
            opacity: 0.7;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">Chat Room</div>
        <div class="welcome">
            welcome in Chat Room! 👋🏻
        </div>

        <ul id="messages" class="messages"></ul>


        <form id="chatForm" class="chat-form">
            <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off" />
            <button type="submit">Send</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script> <!-----IMP-->
    <script>
       
  const form = document.getElementById("chatForm");
  const input = document.getElementById("messageInput");
  const messagesEl = document.getElementById("messages");

  const socket = io();
  

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function appendMessage({ text, at }, { mine }) {
    const li = document.createElement("li");
    if (mine) li.className = "you";

    const textDiv = document.createElement("div");
    textDiv.textContent = text;

    const small = document.createElement("small");
    small.textContent = formatTime(at);

    li.appendChild(textDiv);
    li.appendChild(small);
    messagesEl.appendChild(li);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  socket.on("connect", () => console.log("connected", socket.id));
  socket.on("disconnect", () => console.log("disconnected"));

  socket.on("server:message", (data) => {
    appendMessage(
      { text: String(data?.text ?? ""), at: Number(data?.at ?? Date.now()) },
      { mine: false }
    );
  });

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    const msg = { text, at: Date.now() };
    appendMessage(msg, { mine: true });
    socket.emit("user:message", { text });  ////

    input.value = "";
    input.focus();
  });

    </script>
</body>

</html>
